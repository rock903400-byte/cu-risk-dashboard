name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy black pytest pytest-cov

      - name: Format check (black)
        run: black --check app.py config.py common/ components/ data/ services/ views/ charts/

      - name: Lint (flake8)
        run: flake8 app.py config.py common/ components/ data/ services/ views/ charts/

      - name: Type check (mypy)
        run: mypy app.py config.py common/ components/ data/ services/ views/ charts/

      - name: Test (pytest)
        run: pytest tests/ -v --cov=. --cov-report=term-missing
