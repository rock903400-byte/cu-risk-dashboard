name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Storage API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "Pinging Supabase at $(date -u)"
          STATUS=$(curl -s -o /tmp/body -w "%{http_code}" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            "${SUPABASE_URL}/storage/v1/bucket")
          echo "HTTP status: ${STATUS}"
          cat /tmp/body; echo
          if [ "$STATUS" -ge 500 ] || [ "$STATUS" -eq 000 ]; then
            echo "::error::Supabase may be paused or unreachable (status ${STATUS})"
            exit 1
          fi
          echo "✅ Supabase alive — pause timer reset"
