[tool.black]
line-length = 88
target-version = ["py312"]
exclude = '''
/(
    \.git
  | \.pytest_cache
  | \.streamlit
  | docs
  | tests/fixtures
)/
'''

[tool.flake8]
max-line-length = 88
extend-ignore = ["E203", "W503", "E501"]
exclude = [
    ".git",
    ".pytest_cache",
    ".streamlit",
    "docs",
    "tests/fixtures",
]
