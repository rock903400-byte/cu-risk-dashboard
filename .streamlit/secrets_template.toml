BUCKET_NAME = "excel-reports"
admin_password = "請替換為你的管理員密碼"

[thresholds]
high_risk_ovd = 0.1
liquidity_loan = 0.9
idle_loan = 0.3
stable_loan_min = 0.4
stable_loan_max = 0.8
ovd_safe_line = 0.02
